services:
  - type: web
    name: clipforge
    runtime: python
    plan: starter
    autoDeploy: true

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn app:app --host 0.0.0.0 --port $POR

    healthCheckPath: /

    envVars:
      - key: PYTHON_VERSION
        value: 3.12
